<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Somnia Orchestra | Conduct the Chain</title>
                <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
                        
                            <style>
                                    :root { --somnia-red: #BC47FF; --somnia-yellow: #4D55FF; --somnia-blue: #7A5CFF; }
                                            body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

                                                    /* LOGIN OVERLAY */
                                                            #loginOverlay {
                                                                        position: fixed; inset: 0; background: rgba(0,0,0,0.9);
                                                                                    display: flex; flex-direction: column; align-items: center; justify-content: center;
                                                                                                z-index: 100; transition: opacity 0.5s;
                                                                                                        }

                                                                                                                /* THE ORBS (The "Better Idea" for Visuals) */
                                                                                                                        .orb {
                                                                                                                                    position: absolute; border-radius: 50%; filter: blur(40px);
                                                                                                                                                opacity: 0.3; transition: all 0.3s ease; z-index: -1;
                                                                                                                                                        }

                                                                                                                                                                /* UI ELEMENTS */
                                                                                                                                                                        #mainContent { display: none; text-align: center; padding-top: 50px; }
                                                                                                                                                                                h1 { font-size: 3rem; letter-spacing: 10px; background: linear-gradient(90deg, var(--somnia-red), var(--somnia-yellow), var(--somnia-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
                                                                                                                                                                                        
                                                                                                                                                                                                button {
                                                                                                                                                                                                            padding: 15px 40px; margin: 10px; background: transparent; 
                                                                                                                                                                                                                        border: 1px solid #fff; color: #fff; cursor: pointer; text-transform: uppercase;
                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                        button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

                                                                                                                                                                                                                                                .active-pulse { transform: scale(2); opacity: 0.8 !important; }
                                                                                                                                                                                                                                                    </style>
                                                                                                                                                                                                                                                    </head>
                                                                                                                                                                                                                                                    <body>

                                                                                                                                                                                                                                                        <div id="loginOverlay">
                                                                                                                                                                                                                                                                <h1>SOMNIA</h1>
                                                                                                                                                                                                                                                                        <p>Awaiting Conductor Signature...</p>
                                                                                                                                                                                                                                                                                <button onclick="mockLogin()">CONNECT WALLET</button>
                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                        <div id="mainContent">
                                                                                                                                                                                                                                                                                                <h1>ORCHESTRA</h1>
                                                                                                                                                                                                                                                                                                        <div id="status">Status: Connected to Somnia Testnet</div>
                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                        <div style="margin-top: 50px;">
                                                                                                                                                                                                                                                                                                                                    <button id="initBtn">INITIALIZE INSTRUMENTS</button>
                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                    <div id="controls" style="display:none; margin-top: 20px;">
                                                                                                                                                                                                                                                                                                                                                                <button onclick="playActivity('regular')">Play Note</button>
                                                                                                                                                                                                                                                                                                                                                                            <button onclick="playActivity('nft')">Mint Sound</button>
                                                                                                                                                                                                                                                                                                                                                                                        <button onclick="playActivity('whale')">Whale Boom</button>
                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                        <div id="orb1" class="orb" style="width: 400px; height: 400px; top: 10%; left: 10%; background: var(--somnia-blue);"></div>
                                                                                                                                                                                                                                                                                                                                                                                                            <div id="orb2" class="orb" style="width: 300px; height: 300px; bottom: 10%; right: 10%; background: var(--somnia-red);"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                        // AUDIO SETUP
                                                                                                                                                                                                                                                                                                                                                                                                                                const violin = new Tone.PolySynth(Tone.Synth).toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                        const bell = new Tone.MetalSynth().toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                                const drum = new Tone.MembraneSynth().toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                                        const reverb = new Tone.Reverb(4).toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                [violin, bell, drum].forEach(s => s.connect(reverb));

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function mockLogin() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // In Day 4 we add real wallet logic. For now, we transition the UI.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('loginOverlay').style.opacity = '0';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('loginOverlay').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('mainContent').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // FIXED: INITIALIZE BUTTON
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('initBtn').addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            await Tone.start(); // This wakes up the audio!
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('initBtn').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('controls').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('status').innerText = "Orchestra Live: Play a sound or wait for blocks.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function playActivity(type) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const now = Tone.now();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const orb1 = document.getElementById('orb1');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const orb2 = document.getElementById('orb2');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (type === 'whale') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                drum.triggerAttackRelease("C1", "2n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                orb1.style.background = "var(--somnia-red)";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                orb1.classList.add('active-pulse');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else if (type === 'nft') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            bell.triggerAttackRelease("G6", "8n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            orb2.style.background = "var(--somnia-yellow)";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            orb2.classList.add('active-pulse');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        violin.triggerAttackRelease("C4", "4n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        orb1.style.background = "var(--somnia-blue)";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        orb1.classList.add('active-pulse');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                orb1.classList.remove('active-pulse');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                orb2.classList.remove('active-pulse');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }, 500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
