<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somnia Block Party 🎸</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --pink: #FF69B4; --light-purple: #B19CD9; --somnia-blue: #6FD5FF; }
        
        /* 1. PURPLE BLACK GRADIENT BACKGROUND */
        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #2D0054 0%, #050505 100%); 
            color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; 
        }

        #landing, #orchestra { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 20; }
        #orchestra { display: none; }

        h1 { color: var(--light-purple); font-size: 3rem; letter-spacing: 8px; margin: 0; }
        p { color: var(--light-purple); opacity: 0.9; max-width: 350px; margin: 25px 0; line-height: 1.6; }

        button {
            padding: 18px 45px; background: white; color: black; border: none; font-weight: bold; 
            cursor: pointer; border-radius: 4px; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--pink); }

        #rippleCanvas { position: absolute; inset: 0; z-index: 15; pointer-events: none; }
        
        .blob { position: absolute; background: var(--somnia-blue); border-radius: 50%; opacity: 0.6; width: 60px; height: 60px; filter: blur(30px); z-index: 10; transition: transform 0.3s; }

        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.7rem; color: #777; z-index: 30; line-height: 2; }
        footer a { color: var(--light-purple); text-decoration: none; margin: 0 10px; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="rippleCanvas"></canvas>

    <div id="landing">
        <h1>BLOCK PARTY 🎸</h1>
        <p>Connect your wallet to join the first on-chain orchestra. Every move on the Somnia network adds a layer to the symphony.</p>
        <button onclick="enterParty()">ENTER PARTY</button>
    </div>

    <div id="orchestra">
        <div class="blob" id="blob1" style="top:20%; left:20%"></div>
        <div class="blob" id="blob2" style="bottom:20%; right:20%; background: var(--pink);"></div>
        
        <h2 id="partyId" style="letter-spacing: 5px; font-weight: 200;">SYNCING...</h2>
        <button id="mintBtn" onclick="mintMySound()">MINT MY SOUND (STT)</button>
        <div id="status" style="margin-top: 30px; font-family: monospace; color: var(--somnia-blue);">Awaiting Blockchain Pulse...</div>
    </div>

    <footer>
        Built by Senseii_ciel 🜂 | For the Somnia Mini Hackathon<br>
        <a href="https://x.com/Senseii_ciel" target="_blank">X (Twitter)</a> |
        <a href="https://discord.com/users/1305099867126759516" target="_blank">Discord</a> |
        <a href="https://github.com/ozzy-sensei" target="_blank">GitHub</a>
    </footer>

    <script>
        let provider, signer, userAddress;
        const MY_WALLET = "0x874192a4403e3a2cd7fe68baacd2fe35d980f71c";
        const RPC_WSS = "wss://dream-rpc.somnia.network/ws";
        const SOMNIA_CHAIN_ID = "0xc48c";
        const COLORS = ["#FF69B4", "#B19CD9", "#6FD5FF", "#00FFCC"];
        const NOTES = ["C4", "E4", "G4", "B4", "D5"];

        // AUDIO - Single instance to prevent lag
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
        const reverb = new Tone.Reverb(3).toDestination();
        synth.connect(reverb);

        // RIPPLE ENGINE
        const canvas = document.getElementById('rippleCanvas');
        const ctx = canvas.getContext('2d');
        let ripples = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function drawRipples() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples.forEach((r, i) => {
                r.r += 3; r.o -= 0.01;
                ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${r.rgb}, ${r.o})`;
                ctx.lineWidth = 2; ctx.stroke();
                if (r.o <= 0) ripples.splice(i, 1);
            });
            requestAnimationFrame(drawRipples);
        }
        drawRipples();

        function spawnRipple(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            ripples.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: 0, o: 0.8, rgb: `${r},${g},${b}` });
        }

        async function enterParty() {
            if (!window.ethereum) return alert("Please use a Web3 wallet!");
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: SOMNIA_CHAIN_ID }] });
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();

                document.getElementById('landing').style.display = 'none';
                document.getElementById('orchestra').style.display = 'flex';
                document.getElementById('partyId').innerText = `PARTY AT: ${userAddress.slice(0, 6)}...`;

                await Tone.start();
                startListener();
            } catch (e) { console.error(e); }
        }

        let lastActivity = Date.now();
        function startListener() {
            const socket = new ethers.WebSocketProvider(RPC_WSS);
            socket.on("block", async (num) => {
                const block = await socket.getBlock(num, true);
                if (block.transactions.length > 0) {
                    lastActivity = Date.now();
                    document.getElementById('status').innerText = `BLOCK #${num} LIVE | ${block.transactions.length} ACTIONS`;
                    block.transactions.slice(0, 3).forEach((tx, i) => {
                        setTimeout(() => playSound(tx.hash), i * 250);
                    });
                }
            });

            // IDLE SOLO MODE: Plays if chain is quiet for 6 seconds
            setInterval(() => {
                if (Date.now() - lastActivity > 6000) {
                    document.getElementById('status').innerText = "CHAIN IDLE: SOLO MODE ACTIVE";
                    playSound(Math.random().toString(16));
                }
            }, 4000);
        }

        function playSound(hash) {
            const noteIndex = parseInt(hash.slice(-1), 16) % NOTES.length;
            const colorIndex = parseInt(hash.slice(-2, -1), 16) % COLORS.length;
            
            synth.triggerAttackRelease(NOTES[noteIndex], "8n");
            spawnRipple(COLORS[colorIndex]);
            
            // Visual pulse on blobs
            const b = document.getElementById(Math.random() > 0.5 ? 'blob1' : 'blob2');
            b.style.transform = "scale(2)";
            setTimeout(() => b.style.transform = "scale(1)", 200);
        }

        async function mintMySound() {
            const btn = document.getElementById('mintBtn');
            btn.innerText = "WAITING...";
            try {
                const tx = await signer.sendTransaction({ to: MY_WALLET, value: ethers.parseEther("0.1") });
                await tx.wait();
                btn.innerText = "MINTED!";
            } catch (e) { btn.innerText = "MINT FAILED"; }
        }
    </script>
</body>
</html>
