<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somnia Block Party | Cyber Symphony</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --pink: #FF69B4; --purple: #B19CD9; --blue: #6FD5FF; }
        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%); 
            color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; 
        }

        #landing, #orchestra { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 20; }
        #orchestra { display: none; }
        
        h1 { color: var(--purple); font-size: 2.5rem; letter-spacing: 8px; margin: 0; text-shadow: 0 0 15px var(--pink); }
        p { color: var(--purple); opacity: 0.8; max-width: 320px; margin: 20px 0; font-size: 0.9rem; }

        #rippleCanvas { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

        button {
            padding: 16px 40px; background: white; color: black; border: none; font-weight: bold; 
            cursor: pointer; border-radius: 4px; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--pink); }
        
        #status { margin-top: 30px; font-family: monospace; color: var(--blue); font-size: 0.7rem; letter-spacing: 1px; }
        
        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.7rem; color: #555; z-index: 30; }
        footer a { color: var(--purple); text-decoration: none; font-weight: bold; margin: 0 5px; }
    </style>
</head>
<body>

    <canvas id="rippleCanvas"></canvas>

    <div id="landing">
        <h1>BLOCK PARTY 🎸</h1>
        <p>The first generative lo-fi orchestra powered by Somnia's high-speed pulse.</p>
        <button onclick="initApp()">INITIALIZE SYSTEM</button>
    </div>

    <div id="orchestra">
        <h2 id="partyId" style="letter-spacing: 4px; font-weight: 200; color: var(--purple);">SYNCING...</h2>
        <button id="mintBtn" onclick="mintNFT()">MINT MY SOUND (STT)</button>
        <div id="status">AWAITING BLOCKCHAIN GENESIS...</div>
    </div>

    <footer>
        Built by Senseii_ciel 🜂 | For Somnia Mini Hackathon<br>
        <a href="https://x.com/Senseii_ciel" target="_blank">X</a> |
        <a href="https://discord.com/users/1305099867126759516" target="_blank">Discord</a> |
        <a href="https://github.com/ozzy-sensei" target="_blank">GitHub</a>
    </footer>

    <script>
        let provider, signer, userAddress;
        const MY_WALLET = "0x874192a4403e3a2cd7fe68baacd2fe35d980f71c"; 
        const RPC_WSS = "wss://dream-rpc.somnia.network/ws";
        const SOMNIA_CHAIN_ID = "0xc48c";
        
        // 1. IMPROVED MUSICAL SCALE (A Minor Pentatonic)
        const SCALE = ["A3", "C4", "D4", "E4", "G4", "A4"];
        const ripples = [];
        let lastAction = Date.now();

        // 2. AUDIO ENGINE (With Bass and Reverb)
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
        const bass = new Tone.MonoSynth({ oscillator: { type: "sine" } }).toDestination();
        const reverb = new Tone.Reverb(4).toDestination();
        synth.connect(reverb);

        const canvas = document.getElementById('rippleCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // 3. RIPPLE ANIMATION
        function draw() {
            ctx.fillStyle = "rgba(5, 0, 15, 0.15)"; // Soft trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ripples.forEach((r, i) => {
                r.r += r.speed; r.o -= 0.01;
                ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${r.rgb}, ${r.o})`;
                ctx.lineWidth = r.lw; ctx.stroke();
                if(r.o <= 0) ripples.splice(i, 1);
            });
            // Idle background ripples (The "LAKE" effect)
            if(Math.random() < 0.02) spawnRipple("177, 156, 217", 1, 0.5); 
            requestAnimationFrame(draw);
        }
        draw();

        function spawnRipple(rgb, speed = 2, lw = 1) {
            ripples.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: 0, o: 0.6, rgb: rgb, speed: speed, lw: lw
            });
        }

        // 4. APP LOGIC
        async function initApp() {
            if (!window.ethereum) return alert("Web3 Wallet Required!");
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: SOMNIA_CHAIN_ID }] });
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();

                document.getElementById('landing').style.display = 'none';
                document.getElementById('orchestra').style.display = 'flex';
                document.getElementById('partyId').innerText = `CONDUCTOR: ${userAddress.slice(0,6)}`;

                await Tone.start();
                startMusicLoop();
                startListener();
            } catch (e) { console.error(e); }
        }

        // 5. THE "SONG" LOOP (Steady Bass & Pulse)
        function startMusicLoop() {
            const loop = new Tone.Loop((time) => {
                // Heartbeat Bass
                bass.triggerAttackRelease("A1", "2n", time, 0.3);
                
                // If idle for > 15s, play a random melody
                if (Date.now() - lastAction > 15000) {
                    const note = SCALE[Math.floor(Math.random() * SCALE.length)];
                    synth.triggerAttackRelease(note, "4n", time + 0.5);
                    spawnRipple("111, 213, 255", 2, 1);
                }
            }, "2n").start(0);
            Tone.Transport.start();
        }

        function startListener() {
            const socket = new ethers.WebSocketProvider(RPC_WSS);
            socket.on("block", async (num) => {
                const block = await socket.getBlock(num, true);
                if(block.transactions.length > 0) {
                    lastAction = Date.now();
                    document.getElementById('status').innerText = `BLOCK #${num} PULSE: ${block.transactions.length} ACTIONS`;
                    
                    // Map TXs to a sequence
                    block.transactions.slice(0, 4).forEach((tx, i) => {
                        const note = SCALE[parseInt(tx.hash.slice(-1), 16) % SCALE.length];
                        setTimeout(() => {
                            synth.triggerAttackRelease(note, "8n");
                            // BIG PINK RIPPLE FOR TRANSACTIONS
                            spawnRipple("255, 105, 180", 4, 3); 
                        }, i * 400);
                    });
                }
            });
        }

        async function mintNFT() {
            const btn = document.getElementById('mintBtn');
            btn.innerText = "SENDING STT...";
            try {
                const tx = await signer.sendTransaction({ to: MY_WALLET, value: ethers.parseEther("0.1") });
                await tx.wait();
                btn.innerText = "MINT SUCCESSFUL!";
                // Victory Chord
                synth.triggerAttackRelease(["A4", "C5", "E5"], "2n");
                spawnRipple("255, 255, 255", 10, 5);
            } catch (e) { btn.innerText = "MINT FAILED"; }
        }
    </script>
</body>
</html>
