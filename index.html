<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Somnia Interactive Orchestra</title>
                
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
                        <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
                            
                                <style>
                                        body { 
                                                    background: #000; color: #fff; font-family: sans-serif; 
                                                                display: flex; flex-direction: column; align-items: center; justify-content: center; 
                                                                            height: 100vh; margin: 0; overflow: hidden;
                                                                                    }
                                                                                            /* Somnia Gradient Text */
                                                                                                    h1 {
                                                                                                                background: linear-gradient(90deg, #FF6B6B, #FFD56F, #6FD5FF);
                                                                                                                            -webkit-background-clip: text;
                                                                                                                                        -webkit-text-fill-color: transparent;
                                                                                                                                                    font-size: 3rem; letter-spacing: 5px;
                                                                                                                                                            }
                                                                                                                                                                    .controls { margin-top: 20px; display: flex; gap: 10px; }
                                                                                                                                                                            button { 
                                                                                                                                                                                        padding: 15px 30px; background: transparent; border: 1px solid #fff; 
                                                                                                                                                                                                    color: #fff; cursor: pointer; transition: 0.3s;
                                                                                                                                                                                                            }
                                                                                                                                                                                                                    button:hover { background: #fff; color: #000; }
                                                                                                                                                                                                                            #status { margin-top: 20px; color: #666; font-family: monospace; }
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                            /* The Idle Animation: A soft pulsing glow */
                                                                                                                                                                                                                                                    #glow {
                                                                                                                                                                                                                                                                position: absolute; width: 300px; height: 300px;
                                                                                                                                                                                                                                                                            background: radial-gradient(circle, rgba(111, 213, 255, 0.2) 0%, transparent 70%);
                                                                                                                                                                                                                                                                                        border-radius: 50%; z-index: -1;
                                                                                                                                                                                                                                                                                                    animation: pulse 4s infinite ease-in-out;
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                    @keyframes pulse {
                                                                                                                                                                                                                                                                                                                                0%, 100% { transform: scale(1); opacity: 0.3; }
                                                                                                                                                                                                                                                                                                                                            50% { transform: scale(1.5); opacity: 0.6; }
                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                // 1. SETUP THE MUSICIANS
                                                                                                                                                                                                                                                                                                                                                                    // The Violin (Melody)
                                                                                                                                                                                                                                                                                                                                                                        const violin = new Tone.PolySynth(Tone.Synth).toDestination();
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                // The Bell (NFT/Special Events)
                                                                                                                                                                                                                                                                                                                                                                                    const bell = new Tone.MetalSynth({
                                                                                                                                                                                                                                                                                                                                                                                            frequency: 1200,
                                                                                                                                                                                                                                                                                                                                                                                                    envelope: { attack: 0.001, release: 0.5 },
                                                                                                                                                                                                                                                                                                                                                                                                            harmonicity: 5.1
                                                                                                                                                                                                                                                                                                                                                                                                                }).toDestination();

                                                                                                                                                                                                                                                                                                                                                                                                                    // The Drum (Big Transactions/Whales)
                                                                                                                                                                                                                                                                                                                                                                                                                        const drum = new Tone.MembraneSynth().toDestination();

                                                                                                                                                                                                                                                                                                                                                                                                                            // Add REVERB (Echo) to make it sound like a Concert Hall, not a basement
                                                                                                                                                                                                                                                                                                                                                                                                                                const hall = new Tone.Reverb(4).toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                    violin.connect(hall);
                                                                                                                                                                                                                                                                                                                                                                                                                                        bell.connect(hall);

                                                                                                                                                                                                                                                                                                                                                                                                                                            // 2. THE INTERACTIVE LOGIC
                                                                                                                                                                                                                                                                                                                                                                                                                                                // This function takes "Activity Data" and chooses the sound
                                                                                                                                                                                                                                                                                                                                                                                                                                                    function playActivitySound(type, value) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            const now = Tone.now();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (type === 'whale') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Big Boom for big money
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            drum.triggerAttackRelease("C1", "2n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else if (type === 'nft') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // High shimmer for NFTs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            bell.triggerAttackRelease("G6", "8n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Smooth notes for regular transactions
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const notes = ["C4", "E4", "G4", "B4"];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const randomNote = notes[Math.floor(Math.random() * notes.length)];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    violin.triggerAttackRelease(randomNote, "4n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Trigger a visual flash
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    flashBackground(type);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function flashBackground(type) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const colors = { whale: '#FF6B6B', nft: '#FFD56F', regular: '#6FD5FF' };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.body.style.backgroundColor = colors[type] || '#111';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(() => { document.body.style.backgroundColor = '#000'; }, 200);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                                                                                                                                        <body>
                                                                                                                                                                                                                                                                                                                                                            <div id="glow"></div>
                                                                                                                                                                                                                                                                                                                                                                <h1>SOMNIA ORCHESTRA</h1>
                                                                                                                                                                                                                                                                                                                                                                    <div id="status">System Ready. Awaiting Conductor...</div>
                                                                                                                                                                                                                                                                                                                                                                     <button onclick="playActivitySound('regular')">Send Test Tx</button>
                                                                                                                                                                                                                                                                                                                                                                     <button onclick="playActivitySound('nft')">Mint Test NFT</button>
                                                                                                                                                                                                                                                                                                                                                                     <button onclick="playActivitySound('whale')">Whale Move</button>
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                            <div class="controls">
                                                                                                                                                                                                                                                                                                                                                                                    <button id="startBtn">INITIALIZE ORCHESTRA</button>
                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                            </html>
