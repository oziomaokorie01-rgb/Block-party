<!DOCTYPE html>
<html>
<head>
    <title>Somnia On-Chain Orchestra</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
                
                    <style>
                            body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
                                    button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #0f0; border: none; border-radius: 10px; }
                                            #status { margin-top: 20px; font-size: 1.2rem; }
                                                </style>
                                                </head>
                                                <body>

                                                    <h1>🎻 Somnia Orchestra</h1>
                                                        <button id="startBtn">START THE ORCHESTRA</button>
                                                            <div id="status">Waiting for your command...</div>

                                                                <script>
                                                                        const startBtn = document.getElementById('startBtn');
                                                                                const statusDiv = document.getElementById('status');

                                                                                        // 2. Setup the "Orchestra" (Synthesizers)
                                                                                                // We use a "PolySynth" so many notes can play at once like an orchestra
                                                                                                        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                                                                                                                
                                                                                                                        // This makes it sound "spacey" and cool
                                                                                                                                const reverb = new Tone.Reverb(3).toDestination();
                                                                                                                                        synth.connect(reverb);

                                                                                                                                                // 3. Define the "Safe" notes (Pentatonic Scale) 
                                                                                                                                                        // These notes ALWAYS sound good together.
                                                                                                                                                                const notes = ["C3", "Eb3", "F3", "G3", "Bb3", "C4", "Eb4"];

                                                                                                                                                                        async function startApp() {
                                                                                                                                                                                    await Tone.start(); // Unlock audio in browser
                                                                                                                                                                                                statusDiv.innerText = "Connecting to Somnia Testnet...";

                                                                                                                                                                                                            // 4. Connect to Somnia Testnet
                                                                                                                                                                                                                        // Replace this URL if Somnia provides a specific one in the docs
                                                                                                                                                                                                                                    const provider = new ethers.JsonRpcProvider("https://rpc.somnia.network"); 

                                                                                                                                                                                                                                                statusDiv.innerText = "Listening for blocks... Vibe initiated.";

                                                                                                                                                                                                                                                            // 5. The "Listener" - Runs every time a new block is found
                                                                                                                                                                                                                                                                        provider.on("block", async (blockNumber) => {
                                                                                                                                                                                                                                                                                        const block = await provider.getBlock(blockNumber);
                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                        // Get a number from the Block Hash (e.g., "0x...abc1")
                                                                                                                                                                                                                                                                                                                                        // We take the last character and turn it into a number
                                                                                                                                                                                                                                                                                                                                                        const lastChar = block.hash.charAt(block.hash.length - 1);
                                                                                                                                                                                                                                                                                                                                                                        const magicNumber = parseInt(lastChar, 16); // 0 to 15

                                                                                                                                                                                                                                                                                                                                                                                        // Map that number to one of our "Safe" notes
                                                                                                                                                                                                                                                                                                                                                                                                        const noteToPlay = notes[magicNumber % notes.length];

                                                                                                                                                                                                                                                                                                                                                                                                                        // 6. PLAY THE NOTE
                                                                                                                                                                                                                                                                                                                                                                                                                                        const now = Tone.now();
                                                                                                                                                                                                                                                                                                                                                                                                                                                        synth.triggerAttackRelease(noteToPlay, "2n", now);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        statusDiv.innerText = `Block #${blockNumber} played note: ${noteToPlay}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        console.log("New Block Hash:", block.hash);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    startBtn.addEventListener('click', () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                startApp();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            startBtn.style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
