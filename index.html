<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <title>Somnia Orchestra MVP</title>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
                <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
                    <style>
                                                               :root { --somnia-red: #BC47FF; --somnia-yellow: #4D55FF; --somnia-blue: #7A5CFF; }
                                                               
                                    body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                                            
                                                    /* 1. LOGIN OVERLAY */
                                                            #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
                                                                    
                                                                            /* 2. DYNAMIC ORBS (Animations) */
                                                                                    .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.2; z-index: -1; animation: breathe 8s infinite ease-in-out; }
                                                                                            @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0.4; } }
                                                                                                    
                                                                                                            .active-pulse { animation: pulse 0.5s ease-out !important; }
                                                                                                                    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

                                                                                                                            /* 3. INTERFACE */
                                                                                                                                    #main { display: none; text-align: center; width: 100%; }
                                                                                                                                            button { padding: 15px 40px; background: transparent; border: 1px solid #fff; color: #fff; cursor: pointer; font-size: 1rem; letter-spacing: 2px; }
                                                                                                                                                    button:hover { background: #fff; color: #000; }
                                                                                                                                                            #status { margin-top: 20px; font-size: 0.7rem; color: #555; text-transform: uppercase; }

                                                                                                                                                                    /* LOADING SPINNER (Hidden by default) */
                                                                                                                                                                            #loader { display: none; width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--somnia-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
                                                                                                                                                                                    @keyframes spin { to { transform: rotate(360deg); } }
                                                                                                                                                                                        </style>
                                                                                                                                                                                        </head>
                                                                                                                                                                                        <body>

                                                                                                                                                                                            <div id="loginOverlay">
                                                                                                                                                                                                    <h1 style="letter-spacing: 15px;">SOMNIA</h1>
                                                                                                                                                                                                            <button onclick="connectWallet()">CONNECT WALLET</button>
                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                    <div id="main">
                                                                                                                                                                                                                            <h1 id="title">ORCHESTRA</h1>
                                                                                                                                                                                                                                    <div id="loader"></div>
                                                                                                                                                                                                                                            <button id="initBtn">INITIALIZE INSTRUMENTS</button>
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                            <div id="controls" style="display:none; margin-top: 20px;">
                                                                                                                                                                                                                                                                        <button onclick="triggerRealTx()">MINT MY SOUND ($2 TEST)</button>
                                                                                                                                                                                                                                                                                    <p id="status">Listening for Somnia Blocks...</p>
                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                    <div id="orb1" class="orb" style="width:400px; height:400px; background:var(--somnia-blue); top:20%; left:20%;"></div>
                                                                                                                                                                                                                                                                                                        <div id="orb2" class="orb" style="width:300px; height:300px; background:var(--somnia-red); bottom:20%; right:20%;"></div>

                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                    let provider, signer, userAddress;
                                                                                                                                                                                                                                                                                                                            const RPC_URL = "https://dream-rpc.somnia.network"; // Somnia Shannon Testnet

                                                                                                                                                                                                                                                                                                                                    // INSTRUMENTS
                                                                                                                                                                                                                                                                                                                                            const violin = new Tone.PolySynth(Tone.Synth).toDestination();
                                                                                                                                                                                                                                                                                                                                                    const bell = new Tone.MetalSynth().toDestination();
                                                                                                                                                                                                                                                                                                                                                            const drum = new Tone.MembraneSynth().toDestination();

                                                                                                                                                                                                                                                                                                                                                                    async function connectWallet() {
                                                                                                                                                                                                                                                                                                                                                                                if (window.ethereum) {
                                                                                                                                                                                                                                                                                                                                                                                                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                                                                                                                                                                                                                                                                                                                                                                                                                userAddress = accounts[0];
                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('loginOverlay').style.opacity = '0';
                                                                                                                                                                                                                                                                                                                                                                                                                                                setTimeout(() => { 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('loginOverlay').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('main').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 800);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('initBtn').addEventListener('click', async () => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                await Tone.start();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('initBtn').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('controls').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    startListeningMode();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // 1. LISTENING MODE
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            async function startListeningMode() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const listenProvider = new ethers.JsonRpcProvider(RPC_URL);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    listenProvider.on("block", async (blockNum) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('status').innerText = `New Block: ${blockNum}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    playImpact('regular'); // Play a note every block
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // 2. REAL TRANSACTION
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        async function triggerRealTx() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const loader = document.getElementById('loader');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const status = document.getElementById('status');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        loader.style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    status.innerText = "Check Wallet to Confirm...";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                provider = new ethers.BrowserProvider(window.ethereum);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                signer = await provider.getSigner();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const tx = await signer.sendTransaction({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    to: userAddress,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        value: ethers.parseEther("0.001")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        status.innerText = "Transaction Pending...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await tx.wait();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        loader.style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        status.innerText = "SUCCESS! Transaction Minted.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        playImpact('whale');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } catch (e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loader.style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    status.innerText = "Transaction Failed.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function playImpact(type) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const now = Tone.now();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (type === 'whale') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        drum.triggerAttackRelease("C1", "2n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        triggerVisuals('var(--somnia-red)');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    violin.triggerAttackRelease("C4", "4n", now);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    triggerVisuals('var(--somnia-blue)');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function triggerVisuals(color) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const o = document.getElementById('orb1');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        o.style.background = color;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    o.classList.add('active-pulse');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setTimeout(() => o.classList.remove('active-pulse'), 500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
