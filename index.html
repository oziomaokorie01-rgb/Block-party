<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somnia Block Party | Nightclub Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --pink: #FF69B4; --purple: #7000FF; --blue: #00D1FF; }
        /* PURPLE BLACK GRADIENT */
        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%); 
            color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; 
        }

        #landing, #orchestra { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #orchestra { display: none; z-index: 10; }
        
        h1 { color: #fff; font-size: 3rem; letter-spacing: 8px; text-shadow: 0 0 20px var(--purple); margin: 0; }
        p { color: var(--blue); letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 20px; }

        .desc-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid var(--purple); max-width: 400px; margin-bottom: 20px; }

        button { 
            padding: 18px 50px; background: var(--purple); color: white; border: none; 
            font-weight: bold; cursor: pointer; border-radius: 50px; letter-spacing: 2px; 
            transition: 0.3s; box-shadow: 0 0 15px var(--purple);
        }
        button:hover { transform: scale(1.05); background: var(--pink); box-shadow: 0 0 30px var(--pink); }

        #rippleCanvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
        #status { margin-top: 30px; font-family: monospace; color: var(--pink); font-size: 0.8rem; }

        footer { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.7rem; color: #555; z-index: 100; }
        footer a { color: var(--blue); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <canvas id="rippleCanvas"></canvas>

    <div id="landing">
        <h1>BLOCK PARTY</h1>
        <p>SOMNIA ON-CHAIN ORCHESTRA</p>
        <div class="desc-box">
            Connect your wallet to join the first live symphony powered by Somnia's 400k TPS. Every transaction creates a new rhythm.
        </div>
        <button onclick="initApp()">ENTER PARTY</button>
    </div>

    <div id="orchestra">
        <h2 id="partyId" style="letter-spacing: 4px; color: var(--blue);">SYNCING...</h2>
        <button id="mintBtn" onclick="mintNFT()">MINT SOUND (STT)</button>
        <div id="status">LISTENING TO GENESIS...</div>
    </div>

    <footer>
        Built by Senseii_ciel 🜂 | For Somnia Mini Hackathon<br>
        <a href="https://x.com/Senseii_ciel" target="_blank">X</a> | <a href="https://github.com/ozzy-sensei" target="_blank">GitHub</a>
    </footer>

    <script>
        let provider, signer, userAddress;
        const MY_WALLET = "0x874192a4403e3a2cd7fe68baacd2fe35d980f71c"; 
        const SOMNIA_CHAIN_ID = "0xc48c"; 
        const RPC_WSS = "wss://dream-rpc.somnia.network/ws";

        // DRUMS & INSTRUMENTS
        const kick = new Tone.MembraneSynth().toDestination();
        const bass = new Tone.MonoSynth({ oscillator: { type: "square" }, envelope: { attack: 0.1 } }).toDestination();
        const lead = new Tone.PolySynth(Tone.Synth).toDestination();
        const reverb = new Tone.Reverb(2).toDestination();
        lead.connect(reverb);

        const SCALE = ["A2", "C3", "E3", "G3", "A3", "C4"];
        const NEONS = ["#FF69B4", "#7000FF", "#00D1FF", "#00FFCC"];
        let ripples = [];

        async function initApp() {
            if (!window.ethereum) return alert("Web3 Wallet Required!");
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: SOMNIA_CHAIN_ID }] });
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();

                document.getElementById('landing').style.display = 'none';
                document.getElementById('orchestra').style.display = 'flex';
                document.getElementById('partyId').innerText = `CONDUCTOR: ${userAddress.slice(0,6)}`;

                // Start Music Engine
                await Tone.start();
                Tone.Transport.bpm.value = 124; // House music tempo
                
                // 4/4 KICK DRUM BEAT
                Tone.Transport.scheduleRepeat((time) => {
                    kick.triggerAttackRelease("C1", "8n", time, 0.6);
                    spawnRipple("#7000FF", true); // Center ripple on kick
                }, "4n");

                Tone.Transport.start();
                startCanvas();
                startLiveListener();
            } catch (e) { console.error(e); }
        }

        function startLiveListener() {
            const socket = new ethers.WebSocketProvider(RPC_WSS);
            socket.on("block", async (num) => {
                const block = await socket.getBlock(num, true);
                document.getElementById('status').innerText = `BLOCK #${num} | TX COUNT: ${block.transactions.length}`;
                
                if(block.transactions.length > 0) {
                    block.transactions.slice(0, 4).forEach((tx, i) => {
                        const note = SCALE[parseInt(tx.hash.slice(-1), 16) % SCALE.length];
                        const color = NEONS[parseInt(tx.hash.slice(-2), 16) % NEONS.length];
                        
                        // Schedule notes on the 8th note grid
                        Tone.Transport.scheduleOnce((time) => {
                            lead.triggerAttackRelease(note, "16n", time, 0.4);
                            bass.triggerAttackRelease(SCALE[0], "32n", time, 0.3);
                            spawnRipple(color, false);
                        }, `+${i * 0.25}`); 
                    });
                }
            });
        }

        function spawnRipple(color, centered) {
            ripples.push({
                x: centered ? window.innerWidth / 2 : Math.random() * window.innerWidth,
                y: centered ? window.innerHeight / 2 : Math.random() * window.innerHeight,
                r: 0,
                o: 0.8,
                c: color
            });
        }

        async function mintNFT() {
            const btn = document.getElementById('mintBtn');
            btn.innerText = "CONFIRMING...";
            try {
                const tx = await signer.sendTransaction({ to: MY_WALLET, value: ethers.parseEther("0.1") });
                await tx.wait();
                btn.innerText = "MINT SUCCESS!";
            } catch (e) { btn.innerText = "MINT FAILED"; }
        }

        function startCanvas() {
            const canvas = document.getElementById('rippleCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            function draw() {
                ctx.fillStyle = "rgba(5, 0, 10, 0.2)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ripples.forEach((r, i) => {
                    r.r += 4; r.o -= 0.015;
                    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                    ctx.strokeStyle = `${r.c}${Math.floor(r.o * 255).toString(16).padStart(2, '0')}`;
                    ctx.lineWidth = 3; ctx.stroke();
                    if(r.o <= 0) ripples.splice(i, 1);
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
