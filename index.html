<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Somnia Orchestra 🎸 | Live On-Chain Sonification</title>
                
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
                        <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
                            
                                <style>
                                        :root {
                                                    --pink: #ff7eb3;
                                                                --light-purple: #bd7eff;
                                                                            --deep-purple: #2D0054;
                                                                                    }

                                                                                            body, html {
                                                                                                        margin: 0; padding: 0; width: 100%; height: 100%;
                                                                                                                    background: var(--deep-purple);
                                                                                                                                color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
                                                                                                                                            overflow: hidden; text-align: center;
                                                                                                                                                    }

                                                                                                                                                            /* 1. PINK TO PURPLE RIPPLE CANVAS */
                                                                                                                                                                    #bgCanvas {
                                                                                                                                                                                position: absolute; top: 0; left: 0;
                                                                                                                                                                                            width: 100%; height: 100%;
                                                                                                                                                                                                        z-index: -1;
                                                                                                                                                                                                                    background: linear-gradient(180deg, var(--deep-purple) 0%, #1a0033 100%);
                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                    /* 2. UI PAGES */
                                                                                                                                                                                                                                           .page {
                                                                                                                                                                                                                                                       position: absolute; inset: 0;
                                                                                                                                                                                                                                                                   display: flex; flex-direction: column;
                                                                                                                                                                                                                                                                               align-items: center; justify-content: center;
                                                                                                                                                                                                                                                                                           padding: 20px; transition: opacity 0.5s;
                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                           #landing { z-index: 10; }
                                                                                                                                                                                                                                                                                                                   #orchestra { z-index: 5; display: none; opacity: 0; }

                                                                                                                                                                                                                                                                                                                           h1 { font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 10px; }
                                                                                                                                                                                                                                                                                                                                   p { max-width: 450px; line-height: 1.6; opacity: 0.8; margin-bottom: 30px; }

                                                                                                                                                                                                                                                                                                                                           button {
                                                                                                                                                                                                                                                                                                                                                       padding: 18px 40px; font-weight: bold; font-size: 1rem;
                                                                                                                                                                                                                                                                                                                                                                   background: white; color: var(--deep-purple);
                                                                                                                                                                                                                                                                                                                                                                               border: none; border-radius: 50px; cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                           box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                           button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }
                                                                                                                                                                                                                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                                                                                                                                                                                           #status { margin-top: 20px; font-family: monospace; color: var(--pink); font-size: 0.8rem; }

                                                                                                                                                                                                                                                                                                                                                                                                                                   /* THE MINT BUTTON - Interactive part */
                                                                                                                                                                                                                                                                                                                                                                                                                                           #mintArea { margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                               </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                               </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                               <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                   <canvas id="bgCanvas"></canvas>

                                                                                                                                                                                                                                                                                                                                                                                                                                                       <div id="landing" class="page">
                                                                                                                                                                                                                                                                                                                                                                                                                                                               <h1>SOMNIA 🎸</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                       <p>Listen to the "Rain" of the blockchain. Every transaction on Somnia generates a musical ripple. Connect your wallet to start the live orchestra.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                               <button onclick="connectAndStart()">CONNECT WALLET</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       <div id="orchestra" class="page">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               <h2 id="walletDisplay">CONDUCTING...</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       <div id="status">Syncing with Somnia Shannon Testnet...</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       <div id="mintArea">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   <p>Conduct your own transaction to hear your unique sound profile.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               <button id="mintBtn" onclick="mintTransaction()">MINT MY SOUND ($2 STT)</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       let provider, signer, userAddress;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               const WSS_URL = "wss://dream-rpc.somnia.network/ws"; // [1, 2]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               // --- 1. VISUAL ENGINE: RAIN RIPPLES ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       const canvas = document.getElementById('bgCanvas');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               const ctx = canvas.getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       let ripples =;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               function resize() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           canvas.width = window.innerWidth;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       canvas.height = window.innerHeight;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       window.onresize = resize;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               resize();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       class Ripple {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   constructor(x, y, color) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   this.x = x; this.y = y;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   this.r = 0; this.opacity = 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   this.color = color;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           update() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           this.r += 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           this.opacity -= 0.01;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   draw() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ctx.strokeStyle = `rgba(${this.color}, ${this.opacity})`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ctx.lineWidth = 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ctx.stroke();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               function animate() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           ctx.clearRect(0,0, canvas.width, canvas.height);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       // Ambient Rain (slow ripples)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   if(Math.random() < 0.02) triggerRipple('255, 126, 179'); // Soft pink

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               ripples = ripples.filter(r => r.opacity > 0);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           ripples.forEach(r => { r.update(); r.draw(); });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       requestAnimationFrame(animate);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       animate();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               function triggerRipple(colorRGB) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const x = Math.random() * canvas.width;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       const y = Math.random() * canvas.height;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   ripples.push(new Ripple(x, y, colorRGB));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   // --- 2. AUDIO ENGINE: ORCHESTRAL MAPPING ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const violin = new Tone.PolySynth(Tone.Synth).toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   const reverb = new Tone.Reverb(5).toDestination();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           violin.connect(reverb);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   // Constant Heartbeat Rhythm
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           const heartbeat = new Tone.Loop(time => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       violin.triggerAttackRelease("C2", "8n", time, 0.2); 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }, "2n");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       // --- 3. BLOCKCHAIN LISTENER & CONNECTIVITY ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               async function connectAndStart() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           if (!window.ethereum) return alert("Please open in MetaMask or Rabby!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   userAddress = accounts;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   provider = new ethers.BrowserProvider(window.ethereum); // [3, 4]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   signer = await provider.getSigner();
